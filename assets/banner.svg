<svg width="1280" height="320" viewBox="0 0 1280 320" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">PrayerQX GitHub Profile Banner</title>
  <desc id="desc">A refined banner for a GitHub profile focused on OCR, document parsing, and PDF to Markdown workflows.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="320" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0B1220"/>
      <stop offset="0.52" stop-color="#111827"/>
      <stop offset="1" stop-color="#1E3A8A"/>
    </linearGradient>
    <linearGradient id="glow" x1="820" y1="58" x2="1118" y2="262" gradientUnits="userSpaceOnUse">
      <stop stop-color="#38BDF8"/>
      <stop offset="1" stop-color="#2563EB"/>
    </linearGradient>
    <linearGradient id="mint" x1="74" y1="72" x2="246" y2="244" gradientUnits="userSpaceOnUse">
      <stop stop-color="#34D399"/>
      <stop offset="1" stop-color="#22C55E"/>
    </linearGradient>
    <filter id="soft" x="776" y="-10" width="476" height="362" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="38"/>
    </filter>
  </defs>

  <rect width="1280" height="320" rx="24" fill="url(#bg)"/>
  <path d="M0 224C118 189 240 188 338 207C449 229 552 266 670 258C822 248 960 180 1107 189C1164 192 1219 203 1280 226V320H0V224Z" fill="#0F172A" opacity="0.48"/>
  <path d="M0 258C146 224 267 232 390 252C522 273 625 286 750 272C895 255 1023 212 1159 222C1199 225 1239 233 1280 243V320H0V258Z" fill="#111D34" opacity="0.82"/>

  <g filter="url(#soft)" opacity="0.58">
    <ellipse cx="1014" cy="156" rx="142" ry="118" fill="url(#glow)"/>
  </g>

  <rect x="72" y="72" width="156" height="156" rx="28" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.12)"/>
  <rect x="98" y="94" width="92" height="116" rx="16" fill="rgba(255,255,255,0.07)" stroke="rgba(255,255,255,0.14)"/>
  <rect x="116" y="74" width="92" height="116" rx="16" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.16)"/>
  <rect x="128" y="88" width="68" height="8" rx="4" fill="url(#mint)"/>
  <rect x="128" y="108" width="56" height="8" rx="4" fill="rgba(255,255,255,0.82)"/>
  <rect x="128" y="126" width="44" height="8" rx="4" fill="rgba(255,255,255,0.55)"/>
  <rect x="128" y="153" width="68" height="26" rx="13" fill="rgba(52,211,153,0.16)" stroke="rgba(52,211,153,0.45)"/>
  <circle cx="144" cy="166" r="4" fill="#34D399"/>
  <rect x="154" y="162" width="28" height="8" rx="4" fill="#D1FAE5"/>

  <text x="268" y="118" fill="white" font-family="Segoe UI, Arial, sans-serif" font-size="48" font-weight="700">PrayerQX</text>
  <text x="268" y="160" fill="#BFDBFE" font-family="Segoe UI, Arial, sans-serif" font-size="21">OCR | Document Parsing | PDF to Markdown</text>
  <text x="268" y="202" fill="#E5E7EB" font-family="Segoe UI, Arial, sans-serif" font-size="20">Structure-aware tools for search, RAG, and usable document conversion.</text>

  <rect x="268" y="232" width="190" height="36" rx="18" fill="rgba(255,255,255,0.07)" stroke="rgba(255,255,255,0.12)"/>
  <rect x="472" y="232" width="166" height="36" rx="18" fill="rgba(255,255,255,0.07)" stroke="rgba(255,255,255,0.12)"/>
  <rect x="652" y="232" width="176" height="36" rx="18" fill="rgba(255,255,255,0.07)" stroke="rgba(255,255,255,0.12)"/>

  <text x="293" y="255" fill="#F8FAFC" font-family="Segoe UI, Arial, sans-serif" font-size="16">PPStructureV3</text>
  <text x="501" y="255" fill="#F8FAFC" font-family="Segoe UI, Arial, sans-serif" font-size="16">Layout Recovery</text>
  <text x="681" y="255" fill="#F8FAFC" font-family="Segoe UI, Arial, sans-serif" font-size="16">RAG-Ready Output</text>
